name: Build Windows Packages
run-name: Build Windows packages from ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and smoke-test Windows packages
    runs-on: windows-latest
    env:
      MCPCLIENT_HEADLESS: '1'
      MCPCLIENT_DATA_DIR: ${{ github.workspace }}/.tmp/mcpclient-test-data
      CI: 'true'
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-desktop.txt
            requirements-dev.txt
            requirements-build.txt

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Validate package version
        id: version
        shell: pwsh
        run: |
          python scripts/version.py verify
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $version = python scripts/version.py get
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "version=$version" | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding UTF8 -Append

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Check Python dependencies
        run: python -m pip check

      - name: Run Python tests
        run: python -m pytest -m "not live_foundry" -q

      - name: Smoke-test backend import
        run: python -c "import backend.main; print('backend import OK')"

      - name: Run React tests
        working-directory: client
        run: npm test -- --watchAll=false

      - name: Audit production client dependencies
        working-directory: client
        run: npm audit --omit=dev --audit-level=high

      - name: Build React client
        working-directory: client
        run: npm run build

      - name: Build Windows packages
        run: |
          python -m PyInstaller --clean --noconfirm mcpclient_win.spec
          python -m PyInstaller --clean --noconfirm mcpclient_win_onedir.spec

      - name: Smoke-test packaged executables
        run: |
          python scripts/smoke_package.py dist/mcpclient.exe
          python scripts/smoke_package.py dist/mcpclient-onedir/mcpclient.exe

      - name: Create Windows archives
        shell: pwsh
        run: ./scripts/package_windows.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcpclient-windows-${{ steps.version.outputs.version }}
          path: |
            mcpclient-windows-${{ steps.version.outputs.version }}.zip
            mcpclient-windows-onedir-${{ steps.version.outputs.version }}.zip
            SHA256SUMS-windows.txt
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
