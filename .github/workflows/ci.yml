name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          version=1.7.12
          archive="actionlint_${version}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}" \
            --output "$archive"
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  $archive" | sha256sum --check
          tar -xzf "$archive" actionlint
          ./actionlint

  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']
    env:
      MCPCLIENT_HEADLESS: '1'
      MCPCLIENT_DATA_DIR: ${{ github.workspace }}/.tmp/mcpclient-test-data-${{ matrix.python-version }}
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt

      - name: Validate dependencies and version metadata
        run: |
          python -m pip check
          python scripts/version.py verify

      - name: Run Python tests
        run: python -m pytest -m "not live_foundry" -q

  frontend:
    name: React / Node 24
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Run React tests
        working-directory: client
        run: npm test -- --watchAll=false

      - name: Audit production dependencies
        working-directory: client
        run: npm audit --omit=dev --audit-level=high

      - name: Build production client
        working-directory: client
        run: npm run build
