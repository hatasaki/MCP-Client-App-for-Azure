# Workflow: build & push Docker image to GHCR with `latest` tag
name: container-release
run-name: Publish container from ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      MCPCLIENT_HEADLESS: '1'
      MCPCLIENT_DATA_DIR: ${{ github.workspace }}/.tmp/mcpclient-test-data
      CI: 'true'
    steps:
      - name: Checkout source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt

      - name: Check Python dependencies
        run: python -m pip check

      - name: Read package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          python scripts/version.py verify
          echo "version=$(python scripts/version.py get)" >> "$GITHUB_OUTPUT"

      - name: Run Python tests
        run: python -m pytest -m "not live_foundry" -q

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Run React tests
        working-directory: client
        run: npm test -- --watchAll=false

      - name: Audit production client dependencies
        working-directory: client
        run: npm audit --omit=dev --audit-level=high

      - name: Build React client
        working-directory: client
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build local smoke image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime-prebuilt
          load: true
          tags: mcp-client-foundry:smoke
          platforms: linux/amd64
          cache-from: type=gha

      - name: Smoke-test container backend import
        run: docker run --rm mcp-client-foundry:smoke python -c "import backend.main; print('container backend import OK')"

      - name: Smoke-test container encrypted settings persistence
        shell: bash
        run: |
          set -euo pipefail
          volume="mcpclient-encryption-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          key="$(python -c 'from app.secret_protection import generate_master_key; print(generate_master_key())')"
          wrong_key="$(python -c 'from app.secret_protection import generate_master_key; print(generate_master_key())')"
          cleanup() { docker volume rm --force "$volume" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker volume create "$volume" >/dev/null
          common=(--rm -v "$volume:/data" -v "$PWD/scripts/smoke_container_encryption.py:/app/smoke.py:ro")
          docker run "${common[@]}" -e MCPCLIENT_ENCRYPTION_KEY="$key" \
            mcp-client-foundry:smoke python /app/smoke.py write
          docker run "${common[@]}" -e MCPCLIENT_ENCRYPTION_KEY="$key" \
            mcp-client-foundry:smoke python /app/smoke.py read
          if docker run "${common[@]}" mcp-client-foundry:smoke python /app/smoke.py read; then
            echo "Encrypted settings unexpectedly loaded without MCPCLIENT_ENCRYPTION_KEY" >&2
            exit 1
          fi
          if docker run "${common[@]}" -e MCPCLIENT_ENCRYPTION_KEY="$wrong_key" \
            mcp-client-foundry:smoke python /app/smoke.py read; then
            echo "Encrypted settings unexpectedly loaded with a different key" >&2
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        id: repo
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - name: Build and push versioned images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime-prebuilt
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.repo }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show summary
        run: |
          {
            echo "Images pushed:"
            echo "- ghcr.io/${{ steps.repo.outputs.repo }}:${{ steps.version.outputs.version }}"
            echo "- ghcr.io/${{ steps.repo.outputs.repo }}:latest"
          } >> "$GITHUB_STEP_SUMMARY"
