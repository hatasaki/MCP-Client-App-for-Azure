name: Build and Release
run-name: Release packages from ${{ github.ref_name }}

on:
  workflow_dispatch:

concurrency:
  group: package-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Validate version and release target
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Official releases must be dispatched from the main branch; got $GITHUB_REF" >&2
            exit 1
          fi

          python scripts/version.py verify
          version="$(python scripts/version.py get)"
          latest_tag="$(git tag --list --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [[ -n "$latest_tag" ]]; then
            python scripts/version.py verify --newer-than "${latest_tag#v}"
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null 2>&1; then
            echo "Tag v${version} already exists. Update version_info.txt and commit it before releasing." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Validated release version $version"

  build:
    name: Build ${{ matrix.osName }} package
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            osName: windows
            ext: zip
          - os: macos-latest
            osName: macos
            ext: tar.gz
    env:
      MCPCLIENT_HEADLESS: '1'
      MCPCLIENT_DATA_DIR: ${{ github.workspace }}/.tmp/mcpclient-test-data
      CI: 'true'
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-desktop.txt
            requirements-dev.txt
            requirements-build.txt

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Check Python dependencies
        run: python -m pip check

      - name: Run Python tests
        run: python -m pytest -m "not live_foundry" -q

      - name: Smoke-test backend import
        run: python -c "import backend.main; print('backend import OK')"

      - name: Run React tests
        working-directory: client
        run: npm test -- --watchAll=false

      - name: Audit production client dependencies
        working-directory: client
        run: npm audit --omit=dev --audit-level=high

      - name: Build React client
        working-directory: client
        run: npm run build

      - name: Build Windows packages
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --clean --noconfirm mcpclient_win.spec
          python -m PyInstaller --clean --noconfirm mcpclient_win_onedir.spec

      - name: Build macOS package
        if: runner.os == 'macOS'
        run: python -m PyInstaller --clean --noconfirm mcpclient_mac.spec

      - name: Smoke-test Windows packages
        if: runner.os == 'Windows'
        run: |
          python scripts/smoke_package.py dist/mcpclient.exe
          python scripts/smoke_package.py dist/mcpclient-onedir/mcpclient.exe

      - name: Smoke-test macOS package
        if: runner.os == 'macOS'
        run: python scripts/smoke_package.py dist/mcpclient.app/Contents/MacOS/mcpclient_bin

      - name: Create Windows archives
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package_windows.ps1 -Version "${{ needs.version.outputs.version }}"

      - name: Upload Windows archives
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcpclient-windows-${{ needs.version.outputs.version }}
          path: |
            mcpclient-windows-${{ needs.version.outputs.version }}.zip
            mcpclient-windows-onedir-${{ needs.version.outputs.version }}.zip
            SHA256SUMS-windows.txt
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Create macOS archive
        if: runner.os == 'macOS'
        run: tar -czf "mcpclient-macos-${{ needs.version.outputs.version }}.tar.gz" README.md -C dist mcpclient.app

      - name: Upload macOS archive
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcpclient-macos-${{ needs.version.outputs.version }}
          path: mcpclient-macos-${{ needs.version.outputs.version }}.tar.gz
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  release:
    name: Publish GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download Windows archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mcpclient-windows-${{ needs.version.outputs.version }}
          path: release-assets

      - name: Download macOS archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mcpclient-macos-${{ needs.version.outputs.version }}
          path: release-assets

      - name: Verify assets and create checksums
        shell: bash
        working-directory: release-assets
        run: |
          set -euo pipefail
          files=(
            "mcpclient-windows-${{ needs.version.outputs.version }}.zip"
            "mcpclient-windows-onedir-${{ needs.version.outputs.version }}.zip"
            "mcpclient-macos-${{ needs.version.outputs.version }}.tar.gz"
          )
          for file in "${files[@]}"; do
            test -s "$file" || { echo "Missing or empty release asset: $file" >&2; exit 1; }
          done
          test -s SHA256SUMS-windows.txt || { echo "Missing Windows runner checksums" >&2; exit 1; }
          sha256sum --check SHA256SUMS-windows.txt
          sha256sum "${files[@]}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          cleanup_partial_release() {
            if gh release view "v${version}" >/dev/null 2>&1; then
              gh release delete "v${version}" --yes --cleanup-tag || true
            fi
          }
          trap cleanup_partial_release ERR
          gh release create "v${version}" \
            release-assets/mcpclient-windows-${version}.zip \
            release-assets/mcpclient-windows-onedir-${version}.zip \
            release-assets/mcpclient-macos-${version}.tar.gz \
            release-assets/SHA256SUMS.txt \
            --target "$GITHUB_SHA" \
            --title "Release ${version}" \
            --generate-notes \
            --draft
          gh release edit "v${version}" --draft=false --latest
          trap - ERR
